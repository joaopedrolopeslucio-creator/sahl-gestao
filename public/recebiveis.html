<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recebíveis do Dia — SAHL</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#090b12;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#e2e8f0;padding:24px}
  h1{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
  .subtitle{font-size:12px;color:#475569;margin-bottom:20px}

  /* Date nav */
  .date-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .date-nav h1{margin:0}
  .date-sep{width:1px;height:20px;background:#1e293b;margin:0 4px}
  .btn-day{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-day:hover{background:#273349;color:#e2e8f0}
  input[type=date].date-input{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:5px 10px;font-size:13px;outline:none;cursor:pointer}
  input[type=date].date-input:focus{border-color:#6366f1}
  .tag-hoje{background:rgba(99,102,241,.15);color:#818cf8;border-radius:4px;font-size:11px;font-weight:700;padding:2px 8px}
  .ml-auto{margin-left:auto}
  .btn-refresh{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s}
  .btn-refresh:hover{color:#e2e8f0}
  .upd{font-size:11px;color:#334155}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px 18px}
  .card-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .card-value{font-size:22px;font-weight:700}
  .card-sub{font-size:11px;color:#475569;margin-top:3px}
  .card.total .card-value{color:#e2e8f0}
  .card.green .card-value{color:#22c55e}
  .card.red .card-value{color:#ef4444}
  .card.amber .card-value{color:#f59e0b}

  /* Recovery bar */
  .recovery-wrap{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 18px;margin-bottom:16px}
  .recovery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .recovery-label{font-size:12px;font-weight:600;color:#94a3b8}
  .recovery-pct{font-size:14px;font-weight:700;color:#22c55e}
  .bar-track{height:8px;background:#0f172a;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .4s ease;background:linear-gradient(90deg,#166534,#22c55e)}
  .bar-fill.low{background:linear-gradient(90deg,#7f1d1d,#ef4444)}
  .bar-fill.mid{background:linear-gradient(90deg,#78350f,#f59e0b)}
  .recovery-meta{display:flex;gap:20px;margin-top:8px}
  .recovery-meta span{font-size:11px;color:#475569}
  .recovery-meta strong{color:#94a3b8}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .tabs{display:flex;gap:2px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:3px}
  .tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#64748b;transition:all .15s;white-space:nowrap}
  .tab.active{background:#1e293b;color:#e2e8f0}
  .search{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;font-size:12px;color:#e2e8f0;outline:none;width:200px}
  .search:focus{border-color:#6366f1}

  /* Table */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;padding:9px 12px;border-bottom:1px solid #1e293b;color:#475569;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid #0f172a;vertical-align:middle}
  tr:hover td{background:#0f172a55}
  .badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700}
  .badge-pago{background:#14532d;color:#86efac}
  .badge-vencido{background:#450a0a;color:#fca5a5}
  .badge-pendente{background:#451a03;color:#fcd34d}
  .badge-estornado{background:#1e293b;color:#64748b}
  .valor{font-weight:700;color:#e2e8f0}
  .nome-cpf small{display:block;font-size:10.5px;color:#475569;margin-top:1px}
  .link-fatura{display:inline-flex;align-items:center;gap:4px;color:#6366f1;font-size:11px;text-decoration:none;padding:2px 8px;border:1px solid #2d2f60;border-radius:4px;transition:all .15s}
  .link-fatura:hover{background:#1e1f4a;color:#a5b4fc}
  .empty{text-align:center;padding:40px;color:#334155;font-size:13px}
  .loading{text-align:center;padding:60px;color:#475569}
  .count-badge{font-size:10px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:4px;margin-left:4px}
  .count-badge.red{background:rgba(239,68,68,.15);color:#fca5a5}
  .count-badge.amber{background:rgba(245,158,11,.15);color:#fcd34d}
  .count-badge.green{background:rgba(34,197,94,.15);color:#86efac}

  @media(max-width:768px){.cards{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="date-nav">
  <h1>Recebíveis do Dia</h1>
  <div class="date-sep"></div>
  <button class="btn-day" onclick="stepDay(-1)">‹</button>
  <input type="date" class="date-input" id="date-input" onchange="loadData()">
  <button class="btn-day" onclick="stepDay(1)">›</button>
  <span class="tag-hoje" id="tag-hoje" style="display:none">Hoje</span>
  <button class="btn-day" onclick="goToday()" id="btn-hoje" style="display:none">← Hoje</button>
  <div class="ml-auto" style="display:flex;align-items:center;gap:8px">
    <span class="upd" id="upd"></span>
    <button class="btn-refresh" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</div>

<div class="cards" id="cards">
  <div class="card total"><div class="card-label">Carregando...</div></div>
</div>

<div class="recovery-wrap" id="recovery-wrap" style="display:none">
  <div class="recovery-header">
    <span class="recovery-label">Taxa de recebimento do dia</span>
    <span class="recovery-pct" id="pct-receb">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  <div class="recovery-meta">
    <span><strong id="meta-recebido">—</strong> recebido</span>
    <span><strong id="meta-esperado">—</strong> esperado</span>
    <span id="meta-gap"></span>
  </div>
</div>

<div class="toolbar">
  <div class="tabs">
    <button class="tab active" data-tab="todos"    onclick="setTab('todos',this)">Todos <span class="count-badge" id="cnt-todos"></span></button>
    <button class="tab"        data-tab="vencidos" onclick="setTab('vencidos',this)">Vencidos <span class="count-badge red" id="cnt-vencidos"></span></button>
    <button class="tab"        data-tab="pendentes" onclick="setTab('pendentes',this)">Pendentes <span class="count-badge amber" id="cnt-pendentes"></span></button>
    <button class="tab"        data-tab="pagos"    onclick="setTab('pagos',this)">Pagos <span class="count-badge green" id="cnt-pagos"></span></button>
  </div>
  <input class="search" id="search" type="text" placeholder="Buscar por nome ou CPF..." oninput="renderTable()">
</div>

<div id="table-wrap">
  <div class="loading">Buscando cobranças no Asaas...</div>
</div>

<script>
var _dados = null;
var _aba = 'todos';
var _today = new Date().toISOString().slice(0, 10);

// ── Date helpers ──────────────────────────────────────────────────────────────
function getDate() { return document.getElementById('date-input').value || _today; }

function setDate(d) {
  document.getElementById('date-input').value = d;
  var isToday = d === _today;
  document.getElementById('tag-hoje').style.display  = isToday ? '' : 'none';
  document.getElementById('btn-hoje').style.display  = isToday ? 'none' : '';
}

function stepDay(n) {
  var d = new Date(getDate() + 'T12:00:00');
  d.setDate(d.getDate() + n);
  setDate(d.toISOString().slice(0, 10));
  loadData();
}

function goToday() { setDate(_today); loadData(); }

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData(refresh) {
  var date = getDate();
  document.getElementById('table-wrap').innerHTML = '<div class="loading">Buscando cobranças' + (refresh ? ' (atualizando...)' : '') + '...</div>';
  document.getElementById('recovery-wrap').style.display = 'none';
  document.getElementById('cards').innerHTML = '<div class="card total"><div class="card-label">Carregando...</div></div>';
  try {
    var url = '/api/recebiveis?data=' + date + (refresh ? '&refresh=1' : '');
    var r = await fetch(url);
    _dados = await r.json();
    if (_dados.error) throw new Error(_dados.error);
    renderCards();
    renderRecovery();
    renderTable();
    var dt = new Date(_dados.updatedAt);
    document.getElementById('upd').textContent = 'Atualizado às ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">Erro: ' + esc(e.message) + '</div>';
    document.getElementById('cards').innerHTML = '<div class="card red"><div class="card-label">Erro ao carregar</div><div class="card-value" style="font-size:13px">' + esc(e.message) + '</div></div>';
  }
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards() {
  var s = _dados.resumo;
  document.getElementById('cnt-todos').textContent      = s.countTotal;
  document.getElementById('cnt-vencidos').textContent   = s.countVencido;
  document.getElementById('cnt-pendentes').textContent  = s.countPendente;
  document.getElementById('cnt-pagos').textContent      = s.countPago;

  document.getElementById('cards').innerHTML =
    card('total', 'R$ ' + fmt(s.esperado),  'Esperado',   s.countTotal + ' cobranças') +
    card('green', 'R$ ' + fmt(s.recebido),  'Recebido',   s.countPago + ' pagas · ' + s.taxaRecuperacao.toFixed(1) + '%') +
    card('red',   'R$ ' + fmt(s.vencido),   'Em atraso',  s.countVencido + ' cobranças vencidas') +
    card('amber', 'R$ ' + fmt(s.pendente),  'Pendente',   s.countPendente + ' aguardando processamento');
}

function card(cls, val, label, sub) {
  return '<div class="card ' + cls + '"><div class="card-label">' + label + '</div><div class="card-value">' + val + '</div><div class="card-sub">' + sub + '</div></div>';
}

// ── Render recovery bar ───────────────────────────────────────────────────────
function renderRecovery() {
  var s = _dados.resumo;
  if (!s.esperado) return;
  var pct = s.taxaRecuperacao;
  document.getElementById('recovery-wrap').style.display = '';
  document.getElementById('pct-receb').textContent = pct.toFixed(1) + '%';
  var fill = document.getElementById('bar-fill');
  fill.style.width = Math.min(pct, 100) + '%';
  fill.className = 'bar-fill' + (pct < 50 ? ' low' : pct < 80 ? ' mid' : '');
  document.getElementById('meta-recebido').textContent = 'R$ ' + fmt(s.recebido);
  document.getElementById('meta-esperado').textContent = 'R$ ' + fmt(s.esperado);
  var gap = s.esperado - s.recebido - s.pendente;
  document.getElementById('meta-gap').innerHTML = gap > 0
    ? '<strong style="color:#ef4444">R$ ' + fmt(gap) + '</strong> gap confirado'
    : '';
}

// ── Render table ──────────────────────────────────────────────────────────────
function setTab(aba, btn) {
  _aba = aba;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  if (!_dados) return;
  var q = (document.getElementById('search').value || '').toLowerCase();
  var rows = _dados.cobrancas.filter(function(r) {
    if (_aba === 'vencidos'  && r.status !== 'VENCIDO')   return false;
    if (_aba === 'pendentes' && r.status !== 'PENDENTE')  return false;
    if (_aba === 'pagos'     && r.status !== 'PAGO')      return false;
    if (q) return r.nome.toLowerCase().includes(q) || r.cpf.includes(q) || r.descricao.toLowerCase().includes(q);
    return true;
  });

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">Nenhuma cobrança encontrada.</div>';
    return;
  }

  var html = '<table><thead><tr>' +
    '<th>#</th><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Status</th><th>Fatura</th>' +
    '</tr></thead><tbody>';

  rows.forEach(function(r, i) {
    var statusBadge = '<span class="badge badge-' + r.status.toLowerCase() + '">' + r.status + '</span>';
    var fatura = r.linkFatura
      ? '<a class="link-fatura" href="' + esc(r.linkFatura) + '" target="_blank">Ver ↗</a>'
      : '<span style="color:#334155;font-size:11px">—</span>';
    var dataPag = r.dataPagamento ? '<small style="color:#475569">' + fmtDate(r.dataPagamento) + '</small>' : '';
    html += '<tr>' +
      '<td style="color:#475569">' + (i+1) + '</td>' +
      '<td class="nome-cpf">' + esc(r.nome) + '<small>' + fmtCpf(r.cpf) + '</small></td>' +
      '<td style="color:#64748b;font-size:11.5px">' + esc(r.descricao) + '</td>' +
      '<td class="valor">R$ ' + r.valor.toFixed(2).replace('.',',') + '</td>' +
      '<td>' + statusBadge + ' ' + dataPag + '</td>' +
      '<td>' + fatura + '</td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v) { return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtDate(s) { if (!s) return ''; var p = s.split('-'); return p[2]+'/'+p[1]+'/'+p[0].slice(2); }
function fmtCpf(c) { if (!c || c.length < 11) return c || ''; return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──────────────────────────────────────────────────────────────────────
setDate(_today);
loadData();
</script>
</body>
</html>
