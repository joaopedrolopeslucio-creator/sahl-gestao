<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inadimplência — SAHL</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#090b12;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#e2e8f0;padding:24px}
  h1{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
  .subtitle{font-size:12px;color:#475569;margin-bottom:18px}

  /* ── Main tabs ── */
  .main-tabs{display:flex;gap:2px;background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
  .main-tab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#475569;transition:all .15s;white-space:nowrap}
  .main-tab.active{background:#1e293b;color:#e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .main-tab .cnt{font-size:11px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:4px;margin-left:5px}
  .main-tab.active .cnt{background:rgba(255,255,255,.12)}

  /* ── Cards ── */
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px 18px}
  .card-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .card-value{font-size:22px;font-weight:700;color:#e2e8f0}
  .card-sub{font-size:11px;color:#475569;margin-top:3px}
  .card.danger .card-value{color:#ef4444}
  .card.warn .card-value{color:#f59e0b}
  .card.ok .card-value{color:#22c55e}
  .card.blue .card-value{color:#60a5fa}

  /* ── Recovery bar ── */
  .recovery-wrap{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px 18px;margin-bottom:16px}
  .recovery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .recovery-label{font-size:12px;font-weight:600;color:#94a3b8}
  .recovery-pct{font-size:14px;font-weight:700}
  .bar-track{height:8px;background:#0f172a;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
  .bar-fill.hi {background:linear-gradient(90deg,#166534,#22c55e)}
  .bar-fill.mid{background:linear-gradient(90deg,#78350f,#f59e0b)}
  .bar-fill.lo {background:linear-gradient(90deg,#7f1d1d,#ef4444)}
  .recovery-meta{display:flex;gap:20px;margin-top:8px}
  .recovery-meta span{font-size:11px;color:#475569}
  .recovery-meta strong{color:#94a3b8}

  /* ── Recebíveis date nav ── */
  .date-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .date-sep{width:1px;height:18px;background:#1e293b}
  .btn-day{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-day:hover{background:#273349;color:#e2e8f0}
  input[type=date]{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:5px 10px;font-size:13px;outline:none;cursor:pointer}
  input[type=date]:focus{border-color:#6366f1}
  .tag-hoje{background:rgba(99,102,241,.15);color:#818cf8;border-radius:4px;font-size:11px;font-weight:700;padding:2px 8px}

  /* ── Toolbar ── */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .sub-tabs{display:flex;gap:2px;background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:3px}
  .sub-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#64748b;transition:all .15s;white-space:nowrap}
  .sub-tab.active{background:#1e293b;color:#e2e8f0}
  .sub-tab .sc{font-size:10px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;margin-left:3px}
  .sub-tab.active .sc{background:rgba(255,255,255,.1)}
  .sc.red{background:rgba(239,68,68,.15)!important;color:#fca5a5}
  .sc.amber{background:rgba(245,158,11,.15)!important;color:#fcd34d}
  .sc.green{background:rgba(34,197,94,.15)!important;color:#86efac}
  .search{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 12px;font-size:12px;color:#e2e8f0;outline:none;width:200px}
  .search:focus{border-color:#6366f1}
  select.search{width:160px;cursor:pointer}
  .btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn-green{background:#166534;color:#bbf7d0}
  .btn-gray{background:#1e293b;border:1px solid #334155;color:#94a3b8}
  .ml-auto{margin-left:auto}
  .upd{font-size:11px;color:#334155}

  /* ── Table ── */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;padding:9px 12px;border-bottom:1px solid #1e293b;color:#475569;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  td{padding:9px 12px;border-bottom:1px solid #0f172a;vertical-align:middle}
  tr:hover td{background:#0f172a55}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .badge-inactive{background:#3f1a1a;color:#fca5a5}
  .badge-suspended{background:#3f2a00;color:#fcd34d}
  .badge-pago{background:#14532d;color:#86efac}
  .badge-vencido{background:#450a0a;color:#fca5a5}
  .badge-pendente{background:#451a03;color:#fcd34d}
  .badge-estornado{background:#1e293b;color:#64748b}
  .badge-em_cobranca{background:#451a03;color:#fcd34d}
  .badge-aguardando{background:#0c1a4a;color:#93c5fd}
  .badge-recuperado{background:#14532d;color:#86efac}
  .badge-perdido{background:#1e293b;color:#475569}
  .meses{color:#94a3b8;font-size:11px}
  .valor{font-weight:700;color:#e2e8f0}
  .cobr-count{color:#64748b;font-size:11px}
  .empty{text-align:center;padding:40px;color:#334155;font-size:13px}
  .loading{text-align:center;padding:60px;color:#475569}
  .tag-acum{background:#3b1a00;color:#fb923c;border-radius:4px;font-size:10px;padding:1px 6px;font-weight:600}
  .tag-1mes{background:#1a2d1a;color:#86efac;border-radius:4px;font-size:10px;padding:1px 6px;font-weight:600}

  /* ── Criticidade ── */
  .dias-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
  .dias-critico{background:#450a0a;color:#fca5a5}
  .dias-alto{background:#431407;color:#fdba74}
  .dias-medio{background:#451a03;color:#fcd34d}
  .dias-baixo{background:#1e293b;color:#64748b}
  tr.row-critico td{background:rgba(239,68,68,.04)}
  tr.row-critico td:first-child{border-left:3px solid #ef4444;padding-left:10px}
  tr.row-alto    td{background:rgba(249,115,22,.03)}
  tr.row-alto    td:first-child{border-left:3px solid #f97316;padding-left:10px}
  tr.row-medio   td:first-child{border-left:3px solid #eab308;padding-left:10px}
  tr.row-critico:hover td,tr.row-alto:hover td,tr.row-medio:hover td{background:#0f172a88}
  .nome-cell small{display:block;font-size:10.5px;color:#475569;margin-top:1px}
  .link-fatura{display:inline-flex;align-items:center;gap:3px;color:#6366f1;font-size:11px;text-decoration:none;padding:2px 8px;border:1px solid #2d2f60;border-radius:4px;transition:all .15s}
  .link-fatura:hover{background:#1e1f4a;color:#a5b4fc}
  .btn-copy{background:none;border:1px solid #1e293b;color:#475569;border-radius:4px;padding:2px 7px;font-size:12px;cursor:pointer;transition:all .15s;line-height:1}
  .btn-copy:hover{border-color:#334155;color:#94a3b8}
  .btn-copy.copied{border-color:#166534;color:#22c55e}
  .ult-acao{font-size:10.5px;color:#475569}
  .ult-acao strong{color:#64748b}
  .btn-acao{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);color:#818cf8;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
  .btn-acao:hover{background:rgba(99,102,241,.22);color:#a5b4fc}

  /* ── Modal ── */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:20px}
  .modal-backdrop.open{display:flex}
  .modal-box{background:#0f1220;border:1px solid #1e293b;border-radius:14px;width:100%;max-width:520px;display:flex;flex-direction:column;max-height:90vh;overflow:hidden}
  .modal-header{display:flex;align-items:flex-start;gap:12px;padding:20px 20px 16px;border-bottom:1px solid #1a1f35}
  .modal-header-info{flex:1;min-width:0}
  .modal-title{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .modal-meta{font-size:11px;color:#475569}
  .modal-close{background:none;border:none;color:#3d4466;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:5px;transition:all .15s;flex-shrink:0}
  .modal-close:hover{background:#1a1f35;color:#94a3b8}
  .modal-body{padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .status-group{display:flex;gap:6px;flex-wrap:wrap}
  .status-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;opacity:.5}
  .status-btn:hover{opacity:.8}
  .status-btn.active{opacity:1}
  .status-btn.em_cobranca{background:#451a03;color:#fcd34d;border-color:#78350f}
  .status-btn.aguardando{background:#0c1a4a;color:#93c5fd;border-color:#1e3a7a}
  .status-btn.recuperado{background:#14532d;color:#86efac;border-color:#166534}
  .status-btn.perdido{background:#1a1f2e;color:#475569;border-color:#2a3050}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-label{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em}
  .form-select,.form-textarea{background:#090b12;border:1px solid #1a1f35;color:#e2e8f0;border-radius:7px;padding:8px 10px;font-size:12.5px;outline:none;font-family:inherit;transition:border-color .15s}
  .form-select:focus,.form-textarea:focus{border-color:#6366f1}
  .form-textarea{resize:vertical;min-height:60px}
  .btn-registrar{align-self:flex-end;background:#6366f1;border:none;color:#fff;border-radius:8px;padding:8px 20px;font-size:12.5px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn-registrar:hover{opacity:.85}
  .history-section{border-top:1px solid #1a1f35;padding-top:14px}
  .history-title{font-size:11px;font-weight:700;color:#3d4466;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
  .history-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0f172a}
  .history-item:last-child{border-bottom:none}
  .history-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .history-info{flex:1;min-width:0}
  .history-main{font-size:12px;color:#94a3b8;margin-bottom:2px}
  .history-main strong{color:#e2e8f0}
  .history-notas{font-size:11px;color:#475569;margin-top:2px}
  .history-date{font-size:10.5px;color:#334155;white-space:nowrap}
  .history-empty{font-size:12px;color:#334155;text-align:center;padding:16px 0}
  .section-label{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .obs-row{display:flex;gap:8px}
  .obs-input{flex:1;background:#090b12;border:1px solid #1a1f35;color:#e2e8f0;border-radius:7px;padding:7px 10px;font-size:12.5px;outline:none;font-family:inherit}
  .obs-input:focus{border-color:#6366f1}
  .btn-salvar-obs{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
  .btn-salvar-obs:hover{color:#e2e8f0}
</style>
</head>
<body>
<h1>Inadimplência</h1>
<p class="subtitle">Monitoramento diário de recebíveis e gestão de cobranças em atraso</p>

<!-- ── Main tabs ── -->
<div class="main-tabs">
  <button class="main-tab active" onclick="setMainTab('recebiveis',this)">Recebíveis do Dia</button>
  <button class="main-tab" onclick="setMainTab('ativos',this)">Inadimplentes Ativos <span class="cnt" id="cnt-ativos"></span></button>
  <button class="main-tab" onclick="setMainTab('fantasmas',this)">Fantasmas <span class="cnt" id="cnt-fantasmas"></span></button>
  <button class="main-tab" onclick="setMainTab('naoEnc',this)">Não encontrados <span class="cnt" id="cnt-naoenc"></span></button>
</div>

<!-- ── Área de cards (muda conforme aba) ── -->
<div class="cards" id="cards">
  <div class="card"><div class="card-label">Carregando...</div></div>
</div>

<!-- ── Recovery bar (só na aba recebíveis) ── -->
<div class="recovery-wrap" id="recovery-wrap" style="display:none">
  <div class="recovery-header">
    <span class="recovery-label">Taxa de recebimento</span>
    <span class="recovery-pct" id="pct-receb">—</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  <div class="recovery-meta">
    <span><strong id="meta-recebido">—</strong> recebido</span>
    <span><strong id="meta-esperado">—</strong> esperado</span>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar" id="toolbar">
  <!-- injetado por JS conforme aba -->
</div>

<!-- ── Tabela ── -->
<div id="tabela-wrap">
  <div class="loading">Carregando...</div>
</div>

<!-- ── Modal gestão ── -->
<div class="modal-backdrop" id="modal" onclick="onBackdropClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-title" id="m-nome">—</div>
        <div class="modal-meta" id="m-meta">—</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="section-label">Status da gestão</div>
        <div class="status-group">
          <button class="status-btn em_cobranca" data-s="EM_COBRANCA" onclick="setStatus('EM_COBRANCA')">Em cobrança</button>
          <button class="status-btn aguardando"  data-s="AGUARDANDO"  onclick="setStatus('AGUARDANDO')">Aguardando</button>
          <button class="status-btn recuperado"  data-s="RECUPERADO"  onclick="setStatus('RECUPERADO')">Recuperado</button>
          <button class="status-btn perdido"     data-s="PERDIDO"     onclick="setStatus('PERDIDO')">Perdido</button>
        </div>
      </div>
      <div>
        <div class="section-label">Observação</div>
        <div class="obs-row">
          <input class="obs-input" id="m-obs" type="text" placeholder="Anotação livre...">
          <button class="btn-salvar-obs" onclick="salvarObs()">Salvar</button>
        </div>
      </div>
      <div>
        <div class="section-label">Registrar ação</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select class="form-select" id="m-tipo">
              <option value="WHATSAPP">WhatsApp</option>
              <option value="LIGACAO">Ligação</option>
              <option value="EMAIL">E-mail</option>
              <option value="REENVIO">Reenvio de cobrança</option>
              <option value="TROCA_CARTAO">Troca de cartão</option>
              <option value="OUTRO">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Resultado</label>
            <select class="form-select" id="m-resultado">
              <option value="SEM_RESPOSTA">Sem resposta</option>
              <option value="AGUARDANDO">Aguardando resposta</option>
              <option value="PROMETEU">Prometeu pagar</option>
              <option value="RECUSOU">Recusou pagar</option>
              <option value="PAGO">Pagou ✓</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:10px">
          <label class="form-label">Notas</label>
          <textarea class="form-textarea" id="m-notas" placeholder="Detalhes da conversa..."></textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:10px">
          <button class="btn-registrar" onclick="registrarAcao()">Registrar ação</button>
        </div>
      </div>
      <div class="history-section">
        <div class="history-title">Histórico de ações</div>
        <div id="m-history"><div class="history-empty">Sem ações registradas.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var _mainTab   = 'recebiveis';
var _subTabR   = 'todos';
var _filterDias = '';
var _dadosR    = null;
var _dadosG    = null;
var _modalCpf  = null;
var _modalNome = null;
var _today    = new Date().toISOString().slice(0, 10);

var TIPO_LABEL   = { WHATSAPP:'WhatsApp', LIGACAO:'Ligação', EMAIL:'E-mail', REENVIO:'Reenvio', TROCA_CARTAO:'Troca cartão', OUTRO:'Outro' };
var RESULT_LABEL = { SEM_RESPOSTA:'Sem resposta', AGUARDANDO:'Aguardando', PROMETEU:'Prometeu pagar', RECUSOU:'Recusou', PAGO:'Pagou' };
var STATUS_LABEL = { EM_COBRANCA:'Em cobrança', AGUARDANDO:'Aguardando', RECUPERADO:'Recuperado', PERDIDO:'Perdido' };
var RESULT_COLORS= { SEM_RESPOSTA:'#475569', AGUARDANDO:'#60a5fa', PROMETEU:'#f59e0b', RECUSOU:'#ef4444', PAGO:'#22c55e' };

// ── Main tab switch ───────────────────────────────────────────────────────────
function setMainTab(tab, btn) {
  _mainTab = tab;
  document.querySelectorAll('.main-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('recovery-wrap').style.display = 'none';

  if (tab === 'recebiveis') {
    renderToolbarRec();
    if (_dadosR) { renderCardsRec(); renderRecovery(); renderTabelaRec(); }
    else loadRec();
  } else {
    _filterDias = '';
    renderToolbarGest();
    if (_dadosG) { renderCardsGest(); renderTabelaGest(); }
    else loadGest();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RECEBÍVEIS
// ─────────────────────────────────────────────────────────────────────────────
function getDate() { var el=document.getElementById('dp'); return el ? el.value : _today; }

function setDate(d) {
  var el = document.getElementById('dp');
  if (el) el.value = d;
  var t = document.getElementById('tag-hoje-r');
  var b = document.getElementById('btn-hoje-r');
  if (t) t.style.display = d === _today ? '' : 'none';
  if (b) b.style.display = d === _today ? 'none' : '';
}

function stepDay(n) {
  var d = new Date(getDate()+'T12:00:00');
  d.setDate(d.getDate()+n);
  setDate(d.toISOString().slice(0,10));
  loadRec();
}

function goToday() { setDate(_today); loadRec(); }

function renderToolbarRec() {
  document.getElementById('toolbar').innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%">' +
      '<button class="btn-day" onclick="stepDay(-1)">‹</button>' +
      '<input type="date" id="dp" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:5px 10px;font-size:13px;outline:none;cursor:pointer" onchange="loadRec()">' +
      '<button class="btn-day" onclick="stepDay(1)">›</button>' +
      '<span class="tag-hoje" id="tag-hoje-r">Hoje</span>' +
      '<button class="btn-day" id="btn-hoje-r" style="display:none" onclick="goToday()">← Hoje</button>' +
      '<div class="sub-tabs" style="margin-left:12px">' +
        '<button class="sub-tab active" id="sr-todos"    onclick="setSubTabR(\'todos\',this)">Todos <span class="sc" id="sr-cnt-todos"></span></button>' +
        '<button class="sub-tab"        id="sr-vencidos" onclick="setSubTabR(\'vencidos\',this)">Vencidos <span class="sc red" id="sr-cnt-venc"></span></button>' +
        '<button class="sub-tab"        id="sr-pendentes"onclick="setSubTabR(\'pendentes\',this)">Pendentes <span class="sc amber" id="sr-cnt-pend"></span></button>' +
        '<button class="sub-tab"        id="sr-pagos"    onclick="setSubTabR(\'pagos\',this)">Pagos <span class="sc green" id="sr-cnt-pagos"></span></button>' +
      '</div>' +
      '<input class="search" id="search-r" type="text" placeholder="Buscar nome ou CPF..." oninput="renderTabelaRec()" style="margin-left:auto">' +
      '<span class="upd" id="upd-r"></span>' +
      '<button class="btn btn-gray" onclick="loadRec(true)">↻</button>' +
    '</div>';
  setDate(_dadosR ? _dadosR.data : _today);
  if (_dadosR) updateSubTabCounts(_dadosR.resumo);
}

async function loadRec(refresh) {
  var date = getDate() || _today;
  document.getElementById('tabela-wrap').innerHTML = '<div class="loading">Buscando cobranças'+(refresh?' (atualizando...)':'')+'...</div>';
  document.getElementById('recovery-wrap').style.display = 'none';
  document.getElementById('cards').innerHTML = '<div class="card"><div class="card-label">Carregando...</div></div>';
  try {
    _dadosR = await fetch('/api/recebiveis?data='+date+(refresh?'&refresh=1':'')).then(function(r){return r.json();});
    if (_dadosR.error) throw new Error(_dadosR.error);
    renderCardsRec();
    renderRecovery();
    renderTabelaRec();
    var dt = new Date(_dadosR.updatedAt);
    var el = document.getElementById('upd-r');
    if (el) el.textContent = 'às '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setDate(_dadosR.data);
    updateSubTabCounts(_dadosR.resumo);
  } catch(e) {
    document.getElementById('cards').innerHTML = '<div class="card danger"><div class="card-label">Erro</div><div class="card-value" style="font-size:13px">'+esc(e.message)+'</div></div>';
    document.getElementById('tabela-wrap').innerHTML = '<div class="empty">'+esc(e.message)+'</div>';
  }
}

function updateSubTabCounts(s) {
  var t=document.getElementById('sr-cnt-todos');  if(t) t.textContent=s.countTotal;
  var v=document.getElementById('sr-cnt-venc');   if(v) v.textContent=s.countVencido;
  var p=document.getElementById('sr-cnt-pend');   if(p) p.textContent=s.countPendente;
  var g=document.getElementById('sr-cnt-pagos');  if(g) g.textContent=s.countPago;
}

function renderCardsRec() {
  var s = _dadosR.resumo;
  document.getElementById('cards').innerHTML =
    card('', 'R$\u00A0'+fmt(s.esperado),  'Esperado',  s.countTotal+' cobranças') +
    card('ok',   'R$\u00A0'+fmt(s.recebido),  'Recebido',  s.countPago+' pagas · '+s.taxaRecuperacao.toFixed(1)+'%') +
    card('danger','R$\u00A0'+fmt(s.vencido),   'Em atraso', s.countVencido+' vencidas') +
    card('warn',  'R$\u00A0'+fmt(s.pendente),  'Pendente',  s.countPendente+' aguardando');
}

function renderRecovery() {
  var s = _dadosR.resumo;
  if (!s.esperado) return;
  var pct = s.taxaRecuperacao;
  document.getElementById('recovery-wrap').style.display = '';
  document.getElementById('pct-receb').textContent = pct.toFixed(1)+'%';
  document.getElementById('pct-receb').style.color = pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  var fill = document.getElementById('bar-fill');
  fill.style.width = Math.min(pct,100)+'%';
  fill.className = 'bar-fill '+(pct>=80?'hi':pct>=50?'mid':'lo');
  document.getElementById('meta-recebido').textContent = 'R$\u00A0'+fmt(s.recebido);
  document.getElementById('meta-esperado').textContent = 'R$\u00A0'+fmt(s.esperado);
}

function setSubTabR(t, btn) {
  _subTabR = t;
  document.querySelectorAll('.sub-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderTabelaRec();
}

function renderTabelaRec() {
  if (!_dadosR) return;
  var q = ((document.getElementById('search-r')||{}).value||'').toLowerCase();
  var rows = _dadosR.cobrancas.filter(function(r) {
    if (_subTabR==='vencidos'  && r.status!=='VENCIDO')  return false;
    if (_subTabR==='pendentes' && r.status!=='PENDENTE') return false;
    if (_subTabR==='pagos'     && r.status!=='PAGO')     return false;
    if (q) return r.nome.toLowerCase().includes(q)||r.cpf.includes(q)||r.descricao.toLowerCase().includes(q);
    return true;
  });
  if (!rows.length) { document.getElementById('tabela-wrap').innerHTML='<div class="empty">Nenhuma cobrança encontrada.</div>'; return; }
  var html='<table><thead><tr><th>#</th><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Status</th><th>Fatura</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    var fatura = r.linkFatura
      ? '<a class="link-fatura" href="'+esc(r.linkFatura)+'" target="_blank">Ver ↗</a> <button class="btn-copy" title="Copiar link" onclick="copyLink(this,\''+esc(r.linkFatura)+'\')">⎘</button>'
      : '—';
    html+='<tr>'+
      '<td class="cobr-count">'+(i+1)+'</td>'+
      '<td class="nome-cell">'+esc(r.nome)+'<small>'+fmtCpf(r.cpf)+'</small></td>'+
      '<td style="color:#64748b;font-size:11.5px">'+esc(r.descricao)+'</td>'+
      '<td class="valor">R$\u00A0'+r.valor.toFixed(2).replace('.',',')+'</td>'+
      '<td><span class="badge badge-'+r.status.toLowerCase()+'">'+r.status+'</span></td>'+
      '<td>'+fatura+'</td>'+
      '</tr>';
  });
  document.getElementById('tabela-wrap').innerHTML=html+'</tbody></table>';
}

// ─────────────────────────────────────────────────────────────────────────────
// GESTÃO (ativos / fantasmas / naoEnc)
// ─────────────────────────────────────────────────────────────────────────────
function renderToolbarGest() {
  var showCsv  = _mainTab === 'ativos' || _mainTab === 'fantasmas';
  var showDias = _mainTab === 'ativos';
  document.getElementById('toolbar').innerHTML =
    '<input class="search" id="search-g" type="text" placeholder="Buscar por nome ou CPF..." oninput="renderTabelaGest()">' +
    '<select class="search" id="filter-status" onchange="renderTabelaGest()">' +
      '<option value="">Todos os status</option>' +
      '<option value="EM_COBRANCA">Em cobrança</option>' +
      '<option value="AGUARDANDO">Aguardando</option>' +
      '<option value="RECUPERADO">Recuperado</option>' +
      '<option value="PERDIDO">Perdido</option>' +
    '</select>' +
    (showDias ?
      '<select class="search" id="filter-dias" onchange="_filterDias=this.value;renderTabelaGest()" style="width:175px">' +
        '<option value="">Todos os períodos</option>' +
        '<option value="critico">30+ dias (Crítico)</option>' +
        '<option value="alto">16–30 dias (Alto)</option>' +
        '<option value="medio">8–15 dias (Médio)</option>' +
        '<option value="baixo">Até 7 dias (Baixo)</option>' +
      '</select>'
    : '') +
    (showCsv ? '<button class="btn btn-green ml-auto" onclick="downloadCsv()">⬇ CSV</button>' : '<div class="ml-auto"></div>') +
    '<button class="btn btn-gray" onclick="loadGest(true)">↻ Atualizar</button>' +
    '<span class="upd" id="upd-g"></span>';
}

async function loadGest(refresh) {
  document.getElementById('tabela-wrap').innerHTML = '<div class="loading">Buscando dados no Asaas e EVO'+(refresh?' (atualizando...)':'')+'...</div>';
  document.getElementById('cards').innerHTML = '<div class="card"><div class="card-label">Carregando...</div></div>';
  try {
    _dadosG = await fetch('/api/inadimplencia/gestao'+(refresh?'?refresh=1':'')).then(function(r){return r.json();});
    renderCardsGest();
    renderTabelaGest();
    var dt = new Date(_dadosG.updatedAt);
    var el = document.getElementById('upd-g');
    if (el) el.textContent = 'às '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('cnt-ativos').textContent   = _dadosG.ativos.length;
    document.getElementById('cnt-fantasmas').textContent= _dadosG.fantasmas.length;
    document.getElementById('cnt-naoenc').textContent   = (_dadosG.naoEncontrados||[]).length;
  } catch(e) {
    document.getElementById('cards').innerHTML='<div class="card danger"><div class="card-label">Erro</div><div class="card-value" style="font-size:13px">'+esc(e.message)+'</div></div>';
    document.getElementById('tabela-wrap').innerHTML='<div class="empty">'+esc(e.message)+'</div>';
  }
}

function renderCardsGest() {
  var d = _dadosG;
  var tA = d.ativos.reduce(function(s,x){return s+x.total;},0);
  var tF = d.fantasmas.reduce(function(s,x){return s+x.total;},0);
  var acum = d.ativos.filter(function(a){return a.meses.length>1;}).length;
  var criticos = d.ativos.filter(function(a){ return calcDiasAtraso(a.cobras) >= 30; }).length;
  document.getElementById('cards').innerHTML =
    card('warn',   d.ativos.length,                'Inadimplentes ativos',  'Alunos Active no EVO com cobrança vencida') +
    card('danger', criticos,                       'Críticos (30+ dias)',   'Exigem contato imediato') +
    card('danger', 'R$\u00A0'+fmt(tA+tF),          'Total em aberto',       'Ativos R$\u00A0'+fmt(tA)+' + Fantasmas R$\u00A0'+fmt(tF)) +
    card('warn',   acum,                           'Dívida acumulada',      'Inadimplentes com 2+ meses em atraso');
}

function calcDiasAtraso(cobras) {
  if (!cobras || !cobras.length) return 0;
  var earliest = cobras.map(function(c){return c.venc;}).sort()[0];
  var d = new Date(earliest+'T12:00:00');
  var t = new Date(_today+'T12:00:00');
  return Math.max(0, Math.floor((t-d)/(1000*60*60*24)));
}

function nivelCriticidade(dias) {
  if (dias >= 30) return 'critico';
  if (dias >= 16) return 'alto';
  if (dias >= 8)  return 'medio';
  return 'baixo';
}

function renderTabelaGest() {
  if (!_dadosG) return;
  var q   = ((document.getElementById('search-g')||{}).value||'').toLowerCase();
  var fs  = ((document.getElementById('filter-status')||{}).value||'');
  var fd  = _filterDias;
  var srcMap = { ativos: _dadosG.ativos, fantasmas: _dadosG.fantasmas, naoEnc: _dadosG.naoEncontrados||[] };

  var rows = (srcMap[_mainTab]||[]).map(function(r){
    return Object.assign({}, r, { _dias: calcDiasAtraso(r.cobras), _nivel: nivelCriticidade(calcDiasAtraso(r.cobras)) });
  }).filter(function(r){
    if (q  && !r.nome.toLowerCase().includes(q) && !r.cpf.includes(q)) return false;
    if (fs && r.statusGestao !== fs) return false;
    if (fd && r._nivel !== fd) return false;
    return true;
  });

  // Ordena por criticidade → total desc
  var ordemNivel = {critico:0, alto:1, medio:2, baixo:3};
  rows.sort(function(a,b){
    var nd = (ordemNivel[a._nivel]??9) - (ordemNivel[b._nivel]??9);
    return nd !== 0 ? nd : b.total - a.total;
  });

  if (!rows.length) { document.getElementById('tabela-wrap').innerHTML='<div class="empty">Nenhum registro encontrado.</div>'; return; }

  var isFantasma = _mainTab === 'fantasmas';
  var isAtivo    = _mainTab === 'ativos';

  var html='<table><thead><tr>'+
    '<th>#</th><th>Nome</th><th>CPF</th>'+
    (isFantasma?'<th>Status EVO</th>':'')+
    (isAtivo?'<th>Atraso</th>':'')+
    '<th>Vencimento(s)</th><th>Cobr.</th><th>Total</th>'+
    (isAtivo?'<th>Gestão</th><th>Última ação</th><th></th>':'')+
    '</tr></thead><tbody>';

  var NIVEL_LABEL = {critico:'Crítico', alto:'Alto', medio:'Médio', baixo:'Baixo'};

  rows.forEach(function(r,i){
    var acum = r.meses&&r.meses.length>1;
    var tag  = acum?'<span class="tag-acum">acumulado</span>':'<span class="tag-1mes">1 mês</span>';
    var rowCls = isAtivo ? ' class="row-'+r._nivel+'"' : '';
    var evoCol='';
    if (isFantasma) {
      var sc=r.evoStatus==='Suspended'?'badge-suspended':'badge-inactive';
      var sl=r.evoStatus==='Suspended'?'Suspenso':'Inativo';
      evoCol='<td><span class="badge '+sc+'">'+sl+'</span></td>';
    }
    var datas=(r.cobras||[]).map(function(c){return c.venc;}).sort()
      .map(function(v){var p=v.split('-');return p[2]+'/'+p[1]+'/'+p[0].slice(2);}).join('<br>');
    var diasCol='';
    if (isAtivo) {
      diasCol='<td><span class="dias-badge dias-'+r._nivel+'">'+r._dias+'d · '+NIVEL_LABEL[r._nivel]+'</span></td>';
    }
    var gestCols='';
    if (isAtivo) {
      var sg=(r.statusGestao||'EM_COBRANCA').toLowerCase();
      var sgL=STATUS_LABEL[r.statusGestao||'EM_COBRANCA']||r.statusGestao;
      var ua=r.ultimaAcao;
      var ultAcao=ua
        ? '<div class="ult-acao"><strong>'+(TIPO_LABEL[ua.tipo]||ua.tipo)+'</strong> · '+(RESULT_LABEL[ua.resultado]||ua.resultado)+'<br>'+fmtDateISO(ua.data)+'</div>'
        : '<span style="color:#334155;font-size:11px">—</span>';
      gestCols='<td><span class="badge badge-'+sg+'">'+sgL+'</span></td>'+
        '<td>'+ultAcao+'</td>'+
        '<td><button class="btn-acao"'+
          ' data-cpf="'+esc(r.cpf)+'"'+
          ' data-nome="'+esc(r.nome)+'"'+
          ' data-total="'+r.total+'"'+
          ' data-meses="'+esc((r.meses||[]).join(','))+'"'+
          ' data-status="'+esc(r.statusGestao||'EM_COBRANCA')+'"'+
          ' data-obs="'+esc(r.observacao||'')+'"'+
          ' onclick="openModal(this)">Ações</button></td>';
    }
    html+='<tr'+rowCls+'>'+
      '<td class="cobr-count">'+(i+1)+'</td>'+
      '<td>'+esc(r.nome)+' '+tag+'</td>'+
      '<td class="meses">'+r.cpf+'</td>'+
      evoCol+
      diasCol+
      '<td class="meses" style="line-height:1.7">'+datas+'</td>'+
      '<td class="cobr-count">'+(r.cobras||[]).length+'x</td>'+
      '<td class="valor">R$\u00A0'+r.total.toFixed(2).replace('.',',')+'</td>'+
      gestCols+
      '</tr>';
  });
  document.getElementById('tabela-wrap').innerHTML=html+'</tbody></table>';
}

function downloadCsv() {
  var map={ativos:'/api/inadimplencia/csv-ativos',fantasmas:'/api/inadimplencia/csv-fantasmas'};
  var url=map[_mainTab]; if(url) window.open(url);
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openModal(btn) {
  _modalCpf  = btn.getAttribute('data-cpf');
  _modalNome = btn.getAttribute('data-nome');
  var total  = parseFloat(btn.getAttribute('data-total'));
  var meses  = btn.getAttribute('data-meses').split(',').filter(Boolean);
  var status = btn.getAttribute('data-status')||'EM_COBRANCA';
  var obs    = btn.getAttribute('data-obs')||'';
  document.getElementById('m-nome').textContent = _modalNome;
  document.getElementById('m-meta').textContent = 'R$\u00A0'+total.toFixed(2).replace('.',',')+' em aberto · '+meses.length+(meses.length===1?' mês':' meses');
  document.getElementById('m-obs').value = obs;
  updateStatusBtns(status);
  document.getElementById('m-tipo').value    = 'WHATSAPP';
  document.getElementById('m-resultado').value = 'SEM_RESPOSTA';
  document.getElementById('m-notas').value   = '';
  loadHistory(_modalCpf);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); _modalCpf=null; }
function onBackdropClick(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function updateStatusBtns(s) {
  document.querySelectorAll('.status-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-s')===s);});
}

async function setStatus(st) {
  if (!_modalCpf) return;
  updateStatusBtns(st);
  await fetch('/api/inadimplencia/gestao/'+encodeURIComponent(_modalCpf),{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status_gestao:st,nome:_modalNome})
  });
  if (_dadosG) {
    var item=_dadosG.ativos.find(function(a){return a.cpf===_modalCpf;});
    if (item) item.statusGestao=st;
  }
  renderTabelaGest();
}

async function salvarObs() {
  if (!_modalCpf) return;
  var obs=document.getElementById('m-obs').value;
  await fetch('/api/inadimplencia/gestao/'+encodeURIComponent(_modalCpf),{
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({observacao:obs,nome:_modalNome})
  });
  if (_dadosG) {
    var item=_dadosG.ativos.find(function(a){return a.cpf===_modalCpf;});
    if (item) item.observacao=obs;
  }
}

async function registrarAcao() {
  if (!_modalCpf) return;
  var tipo     = document.getElementById('m-tipo').value;
  var resultado= document.getElementById('m-resultado').value;
  var notas    = document.getElementById('m-notas').value;
  await fetch('/api/inadimplencia/gestao/'+encodeURIComponent(_modalCpf)+'/acao',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({tipo,resultado,notas,nome:_modalNome})
  });
  document.getElementById('m-notas').value='';
  if (_dadosG) {
    var item=_dadosG.ativos.find(function(a){return a.cpf===_modalCpf;});
    if (item) {
      item.ultimaAcao={tipo,resultado,data:new Date().toISOString(),notas};
      if (resultado==='PAGO') { item.statusGestao='RECUPERADO'; updateStatusBtns('RECUPERADO'); }
    }
    renderTabelaGest();
  }
  await loadHistory(_modalCpf);
}

async function loadHistory(cpf) {
  var wrap=document.getElementById('m-history');
  wrap.innerHTML='<div class="history-empty">Carregando...</div>';
  try {
    var acoes=await fetch('/api/inadimplencia/gestao/'+encodeURIComponent(cpf)+'/acoes').then(function(r){return r.json();});
    if (!acoes.length){wrap.innerHTML='<div class="history-empty">Sem ações registradas.</div>';return;}
    wrap.innerHTML=acoes.map(function(a){
      var cor=RESULT_COLORS[a.resultado]||'#475569';
      return '<div class="history-item">'+
        '<div class="history-dot" style="background:'+cor+'"></div>'+
        '<div class="history-info">'+
          '<div class="history-main"><strong>'+(TIPO_LABEL[a.tipo]||a.tipo)+'</strong> · <span style="color:'+cor+'">'+(RESULT_LABEL[a.resultado]||a.resultado)+'</span></div>'+
          (a.notas?'<div class="history-notas">'+esc(a.notas)+'</div>':'')+
        '</div>'+
        '<div class="history-date">'+fmtDateISO(a.data_acao)+'</div>'+
        '</div>';
    }).join('');
  } catch(e){wrap.innerHTML='<div class="history-empty">Erro ao carregar histórico.</div>';}
}

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function fmt(v){ return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtCpf(c){ if(!c||c.length<11) return c||''; return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'); }
function fmtDateISO(iso){ if(!iso) return ''; var d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function card(cls, val, label, sub){ return '<div class="card '+cls+'"><div class="card-label">'+label+'</div><div class="card-value">'+val+'</div><div class="card-sub">'+sub+'</div></div>'; }
function copyLink(btn, url) {
  navigator.clipboard.writeText(url).then(function() {
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(function(){ btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1800);
  });
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

// ── Init ──────────────────────────────────────────────────────────────────────
renderToolbarRec();
loadRec();
</script>
</body>
</html>
